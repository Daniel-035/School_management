services:
  - type: web
    name: educonnect-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FIRESTORE_PROJECT_ID
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@school.local
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: APP_BASE_URL
        value: https://school-management-b28r.onrender.com
      - key: CORS_ORIGINS
        value: https://school-management-b28r.onrender.com,http://localhost:5173,*
      - key: SEED_DEMO_DATA
        value: "false"
