name: parent_app
description: Mobile app for parents and legal guardians to track their child's academic progress.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_models:
    path: ../packages/shared_models
  dio: ^5.4.3

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  http: ^1.2.2

  # Formatting
  intl: ^0.20.0

  # Storage
  shared_preferences: ^2.3.2

  # Utilities
  uuid: ^4.5.1
  collection: ^1.18.0

  # Real integrations
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  razorpay_flutter: ^1.3.7
  share_plus: ^10.1.2
  pdf: ^3.11.1
  printing: ^5.13.4
  add_2_calendar: ^3.0.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  path_provider: ^2.1.4
  sentry_flutter: ^8.14.2
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
