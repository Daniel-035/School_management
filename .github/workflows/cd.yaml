name: Continuous Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── shared-types (required by admin panel build) ──────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: |
            packages/shared-types/package-lock.json
            admin_panel/package-lock.json
            functions/package-lock.json

      - name: Install & build shared-types
        run: |
          npm install
          npm run build
        working-directory: packages/shared-types

      # ── Admin Panel ───────────────────────────────────────────────────────
      - name: Install admin panel dependencies
        run: npm install
        working-directory: admin_panel

      - name: Build admin panel
        run: npm run build
        working-directory: admin_panel
        env:
          VITE_API_BASE_URL: /api

      # ── Cloud Functions ───────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      # ── Firebase Deploy ───────────────────────────────────────────────────
      - name: Authenticate to GCP/Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase (Functions, Hosting, Firestore)
        run: firebase deploy --only functions,hosting,firestore --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive

      - name: Run post-deploy smoke test
        run: |
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app/api/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
