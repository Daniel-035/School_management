name: staff_app
description: Mobile app for school staff (teachers, coordinators, operational staff).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_models:
    path: ../packages/shared_models
  dio: ^5.4.3
  intl: ^0.20.2
  uuid: ^4.4.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.2
  provider: ^6.1.2
  go_router: ^13.2.0
  http: ^1.2.2
  http_parser: ^4.0.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3
  file_picker: ^8.0.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  sentry_flutter: ^8.14.2
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
